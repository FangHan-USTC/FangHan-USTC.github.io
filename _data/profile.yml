short_bio: >-
  <p>
  I am a tenure-track professor at the School of Cyber Science and Technology, University of Science and Technology of China. 
  My research interests include digital watermarking and the security of artificial intelligence. My current research focuses on multimedia watermarking and adversarial machine learning.
  Previously, I completed a five-year postdoctoral fellowship the National University of Singapore (working with Assoc. Prof. Chang Ee-Chien), 
  I obtain my Ph.D. (2021) and Bachelor's degree (2016) from the University of Science and Technology of China (USTC), advised by Prof. Yu Nenghai and Prof. Zhang Weiming. 
  <p>
  #   A <a href="https://en.wikipedia.org/wiki/Bicolor_cat" target="_blank">bicolor cat</a> is a cat with white fur combined with fur of some other colour, for example solid black, tabby, or colourpointed.
  # </p>
  # <p>
  #   There are various patterns of a bicolour cat. These range from the Van-patterned (colour on the crown of the head 
  #   and the tail only) to a solid colour with a throat locket or medallion. Bicolour coats are found in many cat breeds, 
  #   as well as being common in domestic longhair and domestic shorthair cats.
