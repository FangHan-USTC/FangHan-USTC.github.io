short_bio: >-
  <p>
  I am a tenure-track professor at the School of Cyber Science and Technology, University of Science and Technology of China. 
  My research interests include digital watermarking, AI security and agent security. My current research focuses on multimedia watermarking and adversarial machine learning.
Prior to joining USTC, I was a postdoctoral researcher at the National University of Singapore, working with Assoc. Prof. Chang Ee-Chien. I obtained my Ph.D. (2021) from USTC under the supervision of Prof. Yu Nenghai and Prof. Zhang Weiming.


